<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #fff;
      --surface-2: #f3f0ec;
      --border: #e0ddd8;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-faint: #a0a0a0;
      --primary: #01696f;
      --green: #2d7a3a;
      --yellow: #b08a00;
      --red: #a83232;
      --radius: 8px;
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --surface: #1e1e1e;
        --surface-2: #262626;
        --border: #333;
        --text: #e0e0e0;
        --text-muted: #888;
        --text-faint: #555;
        --primary: #4f98a3;
        --green: #5aad60;
        --yellow: #d4a800;
        --red: #d45050;
      }
    }

    body {
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      padding: 0;
      width: 100%;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 12px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text); }

    /* ── Content ──────────────────────────────── */
    .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Stats bar ────────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-muted);
    }

    .stats-count {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--text);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .clear-btn:hover { color: var(--red); background: var(--surface-2); }

    /* ── Empty State ──────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; max-width: 240px; margin: 0 auto; }

    /* ── Video Card ───────────────────────────── */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .video-card:hover { border-color: var(--primary); }

    .card-header {
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
    }

    .card-verdict {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 16px;
      color: #fff;
    }

    .verdict-high { background: var(--green); }
    .verdict-mid { background: var(--yellow); }
    .verdict-low { background: var(--red); }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .card-channel {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card-expand-icon {
      flex-shrink: 0;
      color: var(--text-faint);
      transition: transform 0.2s;
    }
    .video-card.expanded .card-expand-icon { transform: rotate(180deg); }

    /* ── Card Detail (expandable) ─────────────── */
    .card-detail {
      display: none;
      padding: 0 12px 12px;
      border-top: 1px solid var(--border);
    }
    .video-card.expanded .card-detail { display: block; padding-top: 10px; }

    /* ── Score Bars ───────────────────────────── */
    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .score-label {
      width: 90px;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .score-value {
      width: 32px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Explanation ──────────────────────────── */
    .explanation {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      padding: 8px 10px;
      background: var(--surface-2);
      border-radius: 6px;
    }

    /* ── Flags ────────────────────────────────── */
    .flags-section {
      margin-top: 8px;
    }

    .flags-label {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .flags-label.red { color: var(--red); }
    .flags-label.green { color: var(--green); }

    .flags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .flag-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .flag-pill.red {
      background: color-mix(in srgb, var(--red) 12%, transparent);
      color: var(--red);
    }

    .flag-pill.green {
      background: color-mix(in srgb, var(--green) 12%, transparent);
      color: var(--green);
    }

    /* ── Meta ─────────────────────────────────── */
    .card-meta {
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-faint);
      display: flex;
      gap: 8px;
    }

    /* ── Progress ─────────────────────────────── */
    .progress-bar {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sorting ──────────────────────────────── */
    .sort-bar {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .sort-btn {
      flex: 1;
      padding: 4px 8px;
      border: none;
      background: transparent;
      border-radius: 5px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .sort-btn:hover { background: var(--surface-2); }
    .sort-btn.active { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">YT</div>
      <span class="header-title">YT Analyzer</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="settings-btn" title="Einstellungen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <p>Klicke den <strong>Analysieren</strong>-Button auf YouTube, um die sichtbaren Videos zu bewerten.</p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
